<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Эффективность</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="mobile.css" media="screen and (max-width: 768px)">
  <script src="user-storage.js"></script>
  <script src="theme.js" defer></script>
  <script src="effect.js" defer></script>
</head>
<body>
  <button id="themeToggle" class="theme-toggle">🌙</button>

  <div class="page-header">
    <div>
      <h1>⚡ Эффективность</h1>
      <p class="subtitle">Пиши в ритме: таймер, счетчик и атмосфера в одной панели.</p>
    </div>
    <div class="page-actions">
      <a class="card small-card" href="index.html">← главное</a>
    </div>
  </div>

  <div class="effect-page">
    <div class="effect-panel">
      <h2>Фокус-сессия</h2>
      <p>Управляй временем и считай прогресс в тексте.</p>
      <div class="timer-display" id="timerDisplay">00:00:00</div>
      <div class="stats-row">
        <div class="stat-box">
          <span>Слова</span>
          <strong id="wordCount">0</strong>
        </div>
        <div class="stat-box">
          <span>Символы</span>
          <strong id="charCount">0</strong>
        </div>
        <div class="stat-box">
          <span>Сессия</span>
          <strong id="sessionCount">0</strong>
        </div>
      </div>
      <div class="effect-controls">
        <button id="startTimerBtn" class="open-btn" type="button">Старт</button>
        <button id="pauseTimerBtn" class="edit-btn" type="button">Пауза</button>
        <button id="resetTimerBtn" class="delete-btn" type="button">Сброс</button>
      </div>
    </div>

    <div class="effect-panel">
      <div class="effect-toolbar" id="formatToolbar">
        <button class="format-btn" data-command="bold" type="button">B</button>
        <button class="format-btn" data-command="italic" type="button">I</button>
        <button class="format-btn" data-command="underline" type="button">U</button>
        <button class="format-btn" data-command="insertUnorderedList" type="button">•</button>
        <button class="format-btn" data-command="insertOrderedList" type="button">1.</button>
        <button class="format-btn" data-command="formatBlock" data-value="h2" type="button">H2</button>
        <button class="format-btn" data-command="formatBlock" data-value="p" type="button">Абзац</button>
        <button class="format-btn" data-command="removeFormat" type="button">⌧</button>
      </div>
      <div id="focusText" class="focus-textarea" contenteditable="true" data-placeholder="Пиши здесь..."></div>
    </div>
  </div>
  <script src="transition.js" defer></script>
</body>
</html>
